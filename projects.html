                if (filter !== 'all' && yearGroup.year !== filter) return;

                const yearSection = document.createElement('div');
                yearSection.className = 'year-section opacity-0 transition-opacity duration-500';
                
                let categoriesHtml = '';
                yearGroup.categories.forEach(cat => {
                    const icon = cat.name.includes('製造') ? 'fa-industry' : 'fa-concierge-bell';
                    const color = cat.name.includes('製造') ? 'text-emerald-600' : 'text-orange-600';
                    const bgColor = cat.name.includes('製造') ? 'bg-emerald-50' : 'bg-orange-50';

                    let projectsList = cat.projects.map(p => `
                        <div class="group p-4 rounded-lg border border-slate-200 hover:border-blue-400 hover:bg-white hover:shadow-md transition-all">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                                <div class="flex-1">
                                    <h4 class="font-bold text-slate-800">${p.client}</h4>
                                    <p class="text-sm text-slate-600 mt-1">${p.title}</p>
                                </div>
                                ${p.status ? `<span class="status-tag ${p.status === '進行中' ? 'status-ongoing' : 'status-completed'} w-fit">${p.status}</span>` : ''}
                            </div>
                        </div>
                    `).join('');

                    categoriesHtml += `
                        <div class="mb-8 last:mb-0">
                            <div class="flex items-center space-x-2 mb-4">
                                <div class="w-10 h-10 ${bgColor} ${color} rounded-lg flex items-center justify-center">
                                    <i class="fas ${icon}"></i>
                                </div>
                                <h3 class="text-xl font-bold text-slate-700">${cat.name}</h3>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${projectsList}
                            </div>
                        </div>
                    `;
                });

                yearSection.innerHTML = `
                    <div class="flex items-baseline space-x-4 mb-6">
                        <h2 class="text-4xl font-black text-slate-300 italic">${yearGroup.year === '110' ? '110 & Prev' : yearGroup.year + 'Y'}</h2>
                        <div class="h-px bg-slate-200 flex-grow"></div>
                    </div>
                    ${categoriesHtml}
                `;
                
                container.appendChild(yearSection);
                setTimeout(() => yearSection.classList.remove('opacity-0'), 100);
            });
        }

        function filterYear(year) {
            // Update UI tabs
            document.querySelectorAll('.year-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.innerText.includes(year) || (year === 'all' && tab.innerText === '全部年份')) {
                    tab.classList.add('active');
                }
            });
            renderProjects(year);
        }

        // Initial Load
        window.onload = () => {
            renderProjects();
        };
    </script>
</body>
</html>
